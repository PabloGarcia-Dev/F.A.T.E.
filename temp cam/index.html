<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#173f35">
    <title>F.A.T.E. | Food Alert and Tracking Engine</title>
    <link rel="stylesheet" href="./css/styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="scanner-card" aria-labelledby="scanner-heading">
        <p class="eyebrow">F.A.T.E.</p>
        <h1 id="scanner-heading">Add a pantry item</h1>
        <p class="intro">Scan the product barcode or enter its number manually.</p>

        <button id="scan-button" class="primary-button" type="button">
          Scan barcode
        </button>

        <div class="divider"><span>or</span></div>

        <div id="manual-barcode-section">
          <label for="manual-barcode-input">Enter barcode manually</label>
          <div class="manual-controls">
            <input
              id="manual-barcode-input"
              type="text"
              inputmode="numeric"
              autocomplete="off"
              pattern="[0-9]*"
              placeholder="UPC or EAN barcode"
              aria-describedby="manual-barcode-error"
            >
            <button id="manual-barcode-button" type="button">Use barcode</button>
          </div>
          <p id="manual-barcode-error" class="field-error" role="alert"></p>
        </div>

        <p id="barcode-result" class="barcode-result" aria-live="polite"></p>
      </section>
    </main>

    <div
      id="scanner-modal"
      class="scanner-modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="scanner-modal-title"
      aria-hidden="true"
    >
      <div id="scanner-container" class="scanner-container">
        <div class="scanner-header">
          <h2 id="scanner-modal-title">Scan a barcode</h2>
          <button
            id="close-scanner-button"
            class="close-button"
            type="button"
            aria-label="Close scanner"
          >
            Cancel
          </button>
        </div>

        <div class="video-frame">
          <video id="scanner-video" autoplay muted playsinline></video>
          <div class="scan-guide" aria-hidden="true"></div>
        </div>

        <p id="scanner-status" class="scanner-status" aria-live="polite">
          Position the entire barcode inside the guide.
        </p>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
